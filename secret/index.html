<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waffles Site (Secret Page)</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap");
      h1 {
        color: #fff;
        text-align: center;
        margin-bottom: 20px;
      }
      html,
      body {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #000;
        overflow: hidden;
      }
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      .hidden {
        display: none !important;
      }
      .waffles img {
        width: 40vw;
        z-index: 2;
        aspect-ratio: 1/1;
      }
      #empty {
        cursor: pointer;
      }
      .sparkle {
        position: absolute;
        width: 10px;
        z-index: 1;
        height: 10px;
        z-index: 1;
        background: radial-gradient(circle, #ff5e00, #ff0000);
        opacity: 0.8;
        animation: float 2s linear forwards;
        pointer-events: none;
        transform: translateY(-100vh);
      }
      @keyframes float {
        to {
          transform: translateY(100vh) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Secret Waffle Page :)</h1>
    <div class="waffles">
      <img id="empty" src="waffle-maker.png" alt="" />
      <img id="full" class="hidden" src="waffles.png" alt="" />
    </div>
    <script>
      const wafflesContainer = document.getElementById("empty");
      const sound = new Audio("yippee.mp3");
      sound.preload = "auto";

      wafflesContainer.addEventListener("click", () => {
        document.querySelectorAll(".waffles *").forEach((el) => {
          sound.play();
          el.classList.toggle("hidden");
        });
        for (let i = 0; i < 20; i++) {
          createSparkle();
        }
      });

      function createSparkle() {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = Math.random() * window.innerWidth + "px";
        sparkle.style.top = window.innerHeight + "px";
        sparkle.style.animationDuration = 1 + Math.random() + "s";
        document.body.appendChild(sparkle);
        setTimeout(() => {
          sparkle.remove();
        }, 2000);
      }
    </script>
  </body>
</html>
